<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Z-CITY Loading Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050000; font-family: 'Oswald', sans-serif;
        }

        /* Главный контейнер с виньеткой */
        .wrapper {
            position: relative;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 100%);
            z-index: 10;
        }

        /* Фон с градиентом */
        .background {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #4b0000 0%, #000000 70%);
            z-index: 1;
        }

        /* Анимированная сетка с перспективой */
        .grid-container {
            position: absolute;
            width: 100%; height: 100%;
            perspective: 500px;
            z-index: 2;
            bottom: -20%;
        }

        .grid {
            position: absolute;
            width: 200%; height: 200%;
            left: -50%; top: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 0, 0, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 0, 0.15) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg);
            animation: moveGrid 3s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        /* Свечение в центре */
        .glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.2) 0%, transparent 70%);
            z-index: 3;
            pointer-events: none;
        }

        /* Контент */
        .content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
        }

        .logo {
            font-size: 100px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* Полоска загрузки */
        .loader-container {
            position: absolute;
            bottom: 10%; left: 50%;
            transform: translateX(-50%);
            width: 400px;
            z-index: 30;
        }

        .status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%; height: 4px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .progress-fill {
            width: 0%; height: 100%;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            transition: width 0.3s ease;
        }

        #file-name {
            margin-top: 10px;
            font-size: 12px;
            color: #ff0000;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    
    <div class="grid-container">
        <div class="grid"></div>
    </div>

    <div class="glow"></div>
    <div class="wrapper"></div>

    <div class="content">
        <h1 class="logo" id="logo">Z-CITY RP</h1>
    </div>

    <div class="loader-container">
        <div class="status" id="status">Загрузка ресурсов...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div id="file-name">Подключение к серверу...</div>
    </div>

    <script>
        // Функции для GMod (интеграция с загрузкой)
        function SetFilesNeeded(needed) { totalFiles = needed; }
        function SetFilesRemaining(remaining) {
            let p = ((totalFiles - remaining) / totalFiles) * 100;
            document.getElementById('progress').style.width = p + "%";
        }
        function DownloadingFile(fileName) {
            document.getElementById('file-name').innerHTML = "Скачивание: " + fileName;
        }
        function SetStatusChanged(status) {
            document.getElementById('status').innerHTML = status;
        }

        let totalFiles = 100;

        // Эффект параллакса
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 60;
            const y = (window.innerHeight / 2 - e.pageY) / 60;
            document.getElementById('logo').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
